name: Feature request
description: Suggest an improvement or integration
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should the agent do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Source ingestion
        - Ranking
        - Rewrite and style
        - Image generation
        - Publishing
        - Public blog
        - Deployment
        - Security
        - Documentation
    validations:
      required: true
